# Configuration Nixpacks pour le déploiement Coolify (Laravel, PHP 8.4, sans BDD)

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
# Pas de config:cache au build : les variables d'env sont lues au runtime.
cmds = ["php artisan view:cache"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=8080"
